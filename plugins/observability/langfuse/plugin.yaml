name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Quill — traces conversations, LLM calls, and tool usage. Opt-in via `quill plugins enable observability/langfuse` (or check the box in `quill plugins`)."
author: YOUR_USERNAME
requires_env:
  - QUILL_LANGFUSE_PUBLIC_KEY
  - QUILL_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
